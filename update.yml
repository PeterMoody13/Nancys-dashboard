name: Update dashboard data

on:
  schedule:
    - cron: "*/2 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Monday + Outlook and build data
        run: |
          npm install node-ical --no-save
          node fetch-monday.js
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}
          ICS_URL: ${{ secrets.ICS_URL }}

      - name: Publish updated data
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json personal.json managers.json
          git commit -m "Update dashboard data" || echo "No change"
          git push
