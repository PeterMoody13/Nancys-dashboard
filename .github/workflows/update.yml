name: Update dashboard data

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes (change if you like)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Get the files
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Read Monday and build data.json
        run: node fetch-monday.js
        env:
          MONDAY_TOKEN: ${{ secrets.MONDAY_TOKEN }}

      - name: Publish updated data
        run: |
          git config user.name  "dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json personal.json
          git commit -m "Update dashboard data" || echo "No change"
          git push
