<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nancy Spains — Department Progress</title>
<style>
  /* ============================================================
     NANCY SPAINS — OFFICE WALL (auto-rotating, LIVE)
     Reads data.json. Rotation: Leaderboard -> each department's
     pillars, looping. No personal to-dos / flags / calendar.
     ============================================================ */
  :root{
    --green-deep:#02231f; --green-panel:#063029; --gold:#c69947; --gold-soft:#d8b978;
    --cream:#f2e6c7; --white:#fff; --muted:#8fa8a0; --track:#0e352d;
    --ontrack:#3aa64a; --risk:#e0a02e; --off:#d0342c; --done-b:#2b9fb3; --notstart:#6b7c78;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; background:var(--green-deep); color:var(--white);
    font-family:Georgia,'Times New Roman',serif; overflow:hidden; }
  .stage{ position:relative; height:100vh; width:100vw; }
  .slide{ position:absolute; inset:0; display:flex; flex-direction:column;
    padding:4vh 4vw; opacity:0; transition:opacity .6s ease; pointer-events:none; }
  .slide.active{ opacity:1; pointer-events:auto; }

  .top{ display:flex; align-items:flex-end; justify-content:space-between;
    border-bottom:2px solid var(--gold); padding-bottom:1.6vh; }
  .top .logo{ height:7.5vh; width:auto; display:block; }
  .top .rt{ text-align:right; }
  .top .rt h1{ font-size:4.2vh; color:var(--cream); font-weight:bold; }
  .top .rt .sub{ font-size:2.0vh; color:var(--muted); margin-top:.4vh; font-style:italic; }

  /* leaderboard */
  .quarter{ display:flex; align-items:center; gap:1.2vw; margin:1.4vh 0 .6vh; }
  .quarter .qbar{ flex:1; height:.7vh; background:var(--track); border-radius:1vh; overflow:hidden; }
  .quarter .qfill{ height:100%; background:var(--gold); opacity:.6; }
  .quarter .qtext{ font-size:1.7vh; color:var(--muted); font-style:italic; white-space:nowrap; }
  .board{ flex:1; display:flex; flex-direction:column; justify-content:center; gap:1.6vh; }
  .row{ display:grid; grid-template-columns:6vw 22vw 1fr 12vw; align-items:center; gap:1.6vw;
    padding:1.4vh 1.4vw; border-radius:1.2vh; }
  .row.leader{ background:linear-gradient(90deg, rgba(198,153,71,.16), rgba(198,153,71,.02)); }
  .rank{ font-size:6.5vh; font-weight:bold; color:var(--muted); text-align:center; line-height:1; }
  .row.leader .rank{ color:var(--gold); }
  .who .dept{ font-size:3.4vh; font-weight:bold; color:var(--cream); }
  .who .rock{ font-size:1.9vh; color:var(--muted); margin-top:.4vh;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .metric .barwrap{ position:relative; height:2.4vh; background:var(--track); border-radius:2vh; overflow:hidden; }
  .metric .fill{ position:absolute; left:0; top:0; height:100%; border-radius:2vh; width:0;
    transition:width 1.2s cubic-bezier(.2,.7,.2,1); }
  .metric .pace{ position:absolute; top:-.6vh; bottom:-.6vh; width:.25vh; background:var(--cream); opacity:.8; }
  .metric .pace::after{ content:"pace"; position:absolute; top:-2vh; left:50%; transform:translateX(-50%);
    font-size:1.1vh; font-style:italic; color:var(--muted); }
  .rt-cell{ text-align:right; }
  .rt-cell .pct{ font-size:4.6vh; font-weight:bold; color:var(--white); font-variant-numeric:tabular-nums; line-height:1; }
  .rt-cell .status{ font-size:1.7vh; font-weight:bold; margin-top:.5vh; }

  /* department detail */
  .dept-name{ font-size:7vh; font-weight:bold; color:var(--gold); margin:2vh 0 .4vh; }
  .dept-sub{ font-size:2vh; color:var(--muted); font-style:italic; margin-bottom:1.6vh; }
  .pillars{ flex:1; display:flex; flex-direction:column; justify-content:center; gap:1.2vh; }
  .pillar{ display:flex; align-items:center; gap:1.4vw; padding:1.6vh 1.4vw;
    background:var(--green-panel); border-radius:1.2vh; }
  .pillar .dot{ width:1.8vh; height:1.8vh; border-radius:50%; flex:none; box-shadow:0 0 1.2vh currentColor; }
  .pillar .nm{ flex:1; font-size:3vh; color:var(--cream); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .st-pill{ flex:none; font-size:1.8vh; font-weight:bold; padding:.7vh 1.4vw; border-radius:5vh; border:2px solid currentColor; }
  .empty{ color:var(--muted); font-style:italic; font-size:2.6vh; }

  .foot{ display:flex; align-items:center; justify-content:space-between;
    margin-top:1.4vh; padding-top:1.4vh; border-top:2px solid var(--gold); }
  .values{ font-style:italic; font-size:2vh; color:var(--gold-soft); }
  .dots{ display:flex; gap:8px; }
  .dots span{ width:10px; height:10px; border-radius:50%; background:var(--track); }
  .dots span.on{ background:var(--gold); }
  .updated{ font-size:1.6vh; color:var(--muted); }
  .updated b{ color:var(--gold-soft); font-weight:normal; }
  .timer{ position:absolute; left:0; top:0; height:4px; background:var(--gold); width:0; z-index:5; }
</style>
</head>
<body>
<div class="stage" id="stage"><div class="timer" id="timer"></div></div>

<script>
const VALUES = ["Ambition","Energy","Ownership","Hard Work"];
const FALLBACK = { quarter:{label:"Q3 2026",sub:"Jul – Sep 2026",start:"2026-07-01",end:"2026-09-30"},
  updated:"offline", departments:[] };
const LOGO = "https://nancyspains.co.uk/wp-content/uploads/2025/01/Logo-Landscape-Gold-1.png";
const STATUS = { ontrack:{label:"On Target",colour:"#3aa64a"}, risk:{label:"At Risk",colour:"#e0a02e"},
  off:{label:"Off Track",colour:"#d0342c"}, done:{label:"Complete",colour:"#2b9fb3"}, notstart:{label:"Not Started",colour:"#6b7c78"} };
const PSTATUS = { notstart:{label:"Not Started",colour:"#8fa8a0"}, working:{label:"Working on it",colour:"#e0a02e"},
  stuck:{label:"Stuck",colour:"#d0342c"}, done:{label:"Done",colour:"#3aa64a"} };
const DWELL_LEAD = 18000, DWELL_DEPT = 12000;

const stage = document.getElementById('stage');
let idx = 0, iv = null, DATA = FALLBACK, dwells = [];

function elapsed(q){ const s=new Date(q.start+"T00:00:00"), e=new Date(q.end+"T23:59:59");
  return Math.max(0,Math.min(1,(new Date()-s)/(e-s))); }
function deriveStatus(p,exp){ if(p>=100)return'done'; if(p<=0&&exp<8)return'notstart';
  const d=p-exp; if(d>=-8)return'ontrack'; if(d>=-22)return'risk'; return'off'; }

function topBar(mainRight, subRight){
  return `<div class="top"><img class="logo" src="${LOGO}" alt="Nancy Spains">
    <div class="rt"><h1>${mainRight}</h1><div class="sub">${subRight}</div></div></div>`;
}
function foot(i,total){
  let dots=''; for(let k=0;k<total;k++) dots+=`<span class="${k===i?'on':''}"></span>`;
  return `<div class="foot"><div class="values">${VALUES.join('   ·   ')}</div>
    <div class="dots">${dots}</div><div class="updated">Updated <b>${DATA.updated||'—'}</b></div></div>`;
}
function leaderboardSlide(rows,total,q){
  const exp = Math.round(elapsed(q)*100);
  const body = rows.map((d,i)=>{ const s=STATUS[deriveStatus(d.progress,exp)];
    return `<div class="row ${i===0?'leader':''}"><div class="rank">${i+1}</div>
      <div class="who"><div class="dept">${d.dept}</div><div class="rock">${d.rock||''}</div></div>
      <div class="metric"><div class="barwrap"><div class="fill" data-w="${d.progress}" style="background:${s.colour}"></div>
        <div class="pace" style="left:${exp}%"></div></div></div>
      <div class="rt-cell"><div class="pct">${d.progress}%</div><div class="status" style="color:${s.colour}">${s.label}</div></div>
    </div>`;}).join('');
  return `<div class="slide">${topBar(q.label.split(' ')[0]+' Leaderboard', q.sub)}
    <div class="quarter"><span class="qtext">${q.label}</span>
      <div class="qbar"><div class="qfill" style="width:${exp}%"></div></div>
      <span class="qtext">${exp}% through the quarter</span></div>
    <div class="board">${body}</div>${foot(0,total)}</div>`;
}
function deptSlide(d,i,total,q){
  const done=(d.pillars||[]).filter(p=>p.status==='done').length;
  const body=(d.pillars&&d.pillars.length)
    ? d.pillars.map(p=>{const s=PSTATUS[p.status]||PSTATUS.notstart;
        return `<div class="pillar"><span class="dot" style="color:${s.colour};background:${s.colour}"></span>
          <span class="nm">${p.name}</span><span class="st-pill" style="color:${s.colour}">${s.label}</span></div>`;}).join('')
    : `<div class="empty">No pillars added yet.</div>`;
  return `<div class="slide">${topBar(q.label+' · '+q.sub,'Quarterly rock')}
    <div class="dept-name">${d.dept}</div>
    <div class="dept-sub">${done} of ${(d.pillars||[]).length} pillars done</div>
    <div class="pillars">${body}</div>${foot(i,total)}</div>`;
}
function build(){
  const q=DATA.quarter||FALLBACK.quarter;
  const rows=[...(DATA.departments||[])].sort((a,b)=>b.progress-a.progress);
  const total=rows.length+1;
  dwells=[DWELL_LEAD].concat(rows.map(()=>DWELL_DEPT));
  let html='<div class="timer" id="timer"></div>';
  html+=leaderboardSlide(rows,total,q);
  rows.forEach((d,i)=> html+=deptSlide(d,i+1,total,q));
  stage.innerHTML=html;
  if(idx>=total) idx=0;
  show(idx);
}
function slides(){ return [...stage.querySelectorAll('.slide')]; }
function show(n){
  const S=slides(); if(!S.length) return;
  idx=(n+S.length)%S.length;
  S.forEach((s,i)=>s.classList.toggle('active', i===idx));
  S[idx].querySelectorAll('.fill').forEach(f=>{ f.style.width='0';
    requestAnimationFrame(()=>setTimeout(()=>{ f.style.width=(f.dataset.w||0)+'%'; },120)); });
  const timer=document.getElementById('timer'), dw=dwells[idx]||DWELL_DEPT;
  if(timer){ timer.style.transition='none'; timer.style.width='0';
    requestAnimationFrame(()=>{ timer.style.transition=`width ${dw}ms linear`; timer.style.width='100%'; }); }
  clearInterval(iv); iv=setTimeout(next, dw);
}
function next(){ show(idx+1); }

async function load(){
  try{ const res=await fetch('data.json?t='+Date.now(),{cache:'no-store'});
    if(!res.ok) throw 0; const j=await res.json(); if(j&&j.departments) DATA=j;
  }catch(e){}
  build();
}
load();
setInterval(load, 5*60*1000);              /* re-check data every 5 min */
setTimeout(()=>location.reload(), 6*60*60*1000);
</script>
</body>
</html>
